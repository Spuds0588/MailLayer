<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MailLayer — Compose</title>
    <link rel="stylesheet" href="vendor/quill/quill.snow.css">
    <style>
        :root {
            --burnt-tangerine: #e03616;
            --black: #0c0c0c;
            --dark-grey: #1a1a1a;
            --white: #ffffff;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            box-sizing: border-box;
            overflow: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 0.75rem;
        }

        .header h1 {
            font-size: 1.1rem;
            font-weight: 800;
            margin: 0;
            color: var(--burnt-tangerine);
            letter-spacing: -0.03em;
            text-transform: uppercase;
        }

        .field {
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .field label {
            font-size: 0.65rem;
            font-weight: 800;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .field input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            padding: 0.75rem;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .field input:focus {
            border-color: var(--burnt-tangerine);
        }

        /* Quill Sidebar Styles */
        #editor-container {
            flex: 1;
            min-height: 0;
            background: #111;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
        }

        .ql-toolbar.ql-snow {
            border: none !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
            background: #1a1a1a !important;
        }

        .ql-container.ql-snow {
            border: none !important;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .ql-editor {
            color: #eee !important;
            flex: 1;
            overflow-y: auto;
            font-size: 0.95rem;
        }

        .ql-editor.ql-blank::before {
            color: #4b5563 !important;
        }

        .ql-snow .ql-stroke { stroke: #eee !important; }
        .ql-snow .ql-fill { fill: #eee !important; }
        .ql-snow .ql-picker { color: #eee !important; }
        
        /* Active state icons */
        .ql-snow.ql-toolbar button:hover .ql-stroke,
        .ql-snow.ql-toolbar button.ql-active .ql-stroke {
            stroke: var(--burnt-tangerine) !important;
        }
        .ql-snow.ql-toolbar button:hover .ql-fill,
        .ql-snow.ql-toolbar button.ql-active .ql-fill {
            fill: var(--burnt-tangerine) !important;
        }

        .actions {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
        }

        .send-btn {
            flex: 1;
            background: var(--burnt-tangerine);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: #ff4d2e;
            transform: translateY(-1px);
        }

        .send-btn:disabled {
            background: #333;
            cursor: not-allowed;
            transform: none;
        }

        .discard-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #9ca3af;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .discard-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .status-msg {
            font-size: 0.8rem;
            margin-top: 0.75rem;
            text-align: center;
            color: #9ca3af;
        }

        .ml-signature-block {
            border-top: 1px solid rgba(255, 255, 255, 0.1) !important;
            padding-top: 15px !important;
            margin-top: 25px !important;
            color: #9ca3af !important;
            font-size: 0.9em !important;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="Icons/icon32.png" width="24" height="24" alt="Logo">
    </div>

    <div class="field">
        <label>Recipient</label>
        <input type="text" id="ml-to" placeholder="to@example.com">
    </div>

    <div class="field">
        <label>CC</label>
        <input type="text" id="ml-cc">
    </div>

    <div class="field">
        <label>BCC</label>
        <input type="text" id="ml-bcc">
    </div>

    <div class="field">
        <label>Subject</label>
        <input type="text" id="ml-subject" placeholder="Enter subject...">
    </div>

    <div class="field" style="flex: 1; display: flex; flex-direction: column; min-height: 0;">
        <label>Message</label>
        <div id="editor-container"></div>
    </div>

    <div id="ml-attachments-list" style="margin-bottom: 1rem; display: flex; flex-wrap: wrap; gap: 8px;"></div>

    <div class="actions">
        <button class="discard-btn" id="ml-attach-btn" title="Attach Files">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.66 1.34 3 3 3s3-1.34 3-3V5c0-2.48-2.02-4.5-4.5-4.5S7 2.52 7 5v12.5c0 3.59 2.91 6.5 6.5 6.5s6.5-2.91 6.5-6.5V6h-1.5z"/>
            </svg>
        </button>
        <input type="file" id="ml-file-input" multiple style="display:none;">
        <button class="discard-btn" id="discard-btn">Discard</button>
        <button class="send-btn" id="send-btn">Send</button>
    </div>

    <div id="status" class="status-msg"></div>

    <script src="vendor/quill/quill.min.js"></script>
    <script src="sidebar.js"></script>
</body>
</html>
