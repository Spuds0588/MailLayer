<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MailLayer — Compose</title>
    <link rel="stylesheet" href="vendor/quill/quill.snow.css">
    <style>
        :root {
            --burnt-tangerine: #e03616;
            --black: #0c0c0c;
            --dark-grey: #1a1a1a;
            --white: #ffffff;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            box-sizing: border-box;
            overflow: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 0.75rem;
        }

        .header h1 {
            font-size: 1.1rem;
            font-weight: 800;
            margin: 0;
            color: var(--burnt-tangerine);
            letter-spacing: -0.03em;
            text-transform: uppercase;
        }

        .field {
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .field label {
            font-size: 0.65rem;
            font-weight: 800;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .field input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            padding: 0.75rem;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .field input:focus {
            border-color: var(--burnt-tangerine);
        }

        /* Quill Sidebar Styles */
        #editor-container {
            flex: 1;
            min-height: 0;
            background: #111;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
        }

        .ql-toolbar.ql-snow {
            border: none !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
            background: #1a1a1a !important;
        }

        .ql-container.ql-snow {
            border: none !important;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .ql-editor {
            color: #eee !important;
            flex: 1;
            overflow-y: auto;
            font-size: 0.95rem;
        }

        .ql-editor.ql-blank::before {
            color: #4b5563 !important;
        }

        .ql-snow .ql-stroke { stroke: #eee !important; }
        .ql-snow .ql-fill { fill: #eee !important; }
        .ql-snow .ql-picker { color: #eee !important; }
        
        /* Active state icons */
        .ql-snow.ql-toolbar button:hover .ql-stroke,
        .ql-snow.ql-toolbar button.ql-active .ql-stroke {
            stroke: var(--burnt-tangerine) !important;
        }
        .ql-snow.ql-toolbar button:hover .ql-fill,
        .ql-snow.ql-toolbar button.ql-active .ql-fill {
            fill: var(--burnt-tangerine) !important;
        }

        .actions {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
        }

        .send-btn {
            flex: 1;
            background: var(--burnt-tangerine);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: #ff4d2e;
            transform: translateY(-1px);
        }

        .send-btn:disabled {
            background: #333;
            cursor: not-allowed;
            transform: none;
        }

        .discard-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #9ca3af;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .discard-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .status-msg {
            font-size: 0.8rem;
            margin-top: 0.75rem;
            text-align: center;
            color: #9ca3af;
        }

        .ml-signature-block {
            border-top: 1px solid rgba(255, 255, 255, 0.1) !important;
            padding-top: 15px !important;
            margin-top: 25px !important;
            color: #9ca3af !important;
            font-size: 0.9em !important;
        }

        /* Template Gallery Styles */
        .maillayer-template-gallery {
            position: absolute;
            top: 50px;
            left: 0;
            right: 0;
            bottom: 80px;
            background: var(--black);
            z-index: 100;
            padding: 1rem;
            overflow-y: auto;
            display: none;
        }
        .maillayer-template-gallery.active {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .maillayer-template-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .maillayer-template-card:hover {
            border-color: var(--burnt-tangerine);
            background: rgba(224, 54, 22, 0.05);
        }
        .maillayer-template-card h4 {
            margin: 0;
            font-size: 0.95rem;
            color: white;
        }
        .maillayer-template-card p {
            margin: 4px 0 0 0;
            font-size: 0.75rem;
            color: #9ca3af;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .templates-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .templates-btn.active {
            background: white;
            color: var(--burnt-tangerine);
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="Icons/icon32.png" width="24" height="24" alt="Logo">
        <div style="margin-left: auto; display: flex; gap: 8px;">
            <button class="templates-btn" id="ml-gallery-trigger" style="margin-left:0;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                Templates
            </button>
        </div>
    </div>

    <div class="maillayer-template-gallery" id="ml-template-gallery"></div>


    <div class="field">
        <label>Recipient</label>
        <input type="text" id="ml-to" placeholder="to@example.com">
    </div>

    <div class="field">
        <label>CC</label>
        <input type="text" id="ml-cc">
    </div>

    <div class="field">
        <label>BCC</label>
        <input type="text" id="ml-bcc">
    </div>

    <div class="field">
        <label>Subject</label>
        <input type="text" id="ml-subject" placeholder="Enter subject...">
    </div>

    <div class="field" style="flex: 1; display: flex; flex-direction: column; min-height: 0;">
        <div style="display:flex; justify-content:flex-start; align-items:flex-end; gap: 12px; margin-bottom: 0.5rem;">
            <label style="margin:0;">Message</label>
            <button class="discard-btn" id="ml-attach-btn" title="Add Attachment" style="display:flex; align-items:center; gap:6px; background:transparent; padding:0; font-size:11px; color:#9ca3af; height:auto;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.66 1.34 3 3 3s3-1.34 3-3V5c0-2.48-2.02-4.5-4.5-4.5S7 2.52 7 5v12.5c0 3.59 2.91 6.5 6.5 6.5s6.5-2.91 6.5-6.5V6h-1.5z"/>
                </svg>
                Add Attachment
            </button>
            <input type="file" id="ml-file-input" multiple style="display:none;">
        </div>
        <div id="ml-attachments-list" style="margin-bottom: 0.5rem; display: flex; flex-wrap: wrap; gap: 8px;"></div>
        <div id="editor-container"></div>
    </div>

    <div class="actions" style="flex-direction: column; align-items: center;">
        <div style="display:flex; width: 100%; gap: 0.5rem; margin-bottom: 0.5rem;">
            <button class="discard-btn" id="discard-btn" style="flex:1;">Discard</button>
            <button class="send-btn" id="send-btn" style="flex:1;">Send</button>
        </div>
        <button class="discard-btn" id="ml-exclude-site-btn" title="Disable Auto-Detect" style="display:none; align-items:center; justify-content:center; gap:6px; background:transparent; padding:0; font-size:11px; color:#6b7280; height:auto;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11H7v-2h10v2z"/></svg>
            <span id="ml-exclude-text">Exclude Site</span>
        </button>
    </div>

    <div id="status" class="status-msg"></div>

    <script src="vendor/quill/quill.min.js"></script>
    <script src="sidebar.js"></script>
</body>
</html>
