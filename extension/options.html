<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MailLayer — Tailor Your Experience</title>
    <link rel="stylesheet" href="bulma.min.css">
    <style>
        :root {
            --blackberry: #58355e;
            --burnt-tangerine: #e03616;
            --banana-cream: #fff689;
            --tea-green: #cfffb0;
            --blue-bell: #5998c5;
            --black: #000000;
            --dark-grey: #111111;
            --white: #ffffff;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .options-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-mark {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .logo-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }


        .title { color: var(--white) !important; font-weight: 800; letter-spacing: -0.05em; text-align: center; }
        .subtitle { color: #9ca3af !important; text-align: center; margin-bottom: 2.5rem !important; }

        .field-label {
            font-weight: 700;
            color: var(--blue-bell);
            margin-bottom: 0.5rem;
            display: block;
        }

        .select, select {
            width: 100% !important;
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: var(--white) !important;
            border-radius: 12px !important;
            height: 3.5rem !important;
        }

        .select:not(.is-multiple):not(.is-loading)::after {
            border-color: var(--blue-bell) !important;
        }

        select option {
            background: var(--dark-grey);
            color: var(--white);
        }

        .button.is-primary {
            background-color: var(--burnt-tangerine);
            border: none;
            font-weight: 700;
            height: 3.5rem;
            border-radius: 12px;
            width: 100%;
            margin-top: 1rem;
            transition: all 0.3s ease;
        }

        .button.is-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(224, 54, 22, 0.3);
        }

        .status {
            text-align: center;
            margin-top: 1.5rem;
            font-weight: 600;
            color: var(--tea-green);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .status.visible { opacity: 1; }

        .brand-hint {
            font-size: 0.8rem;
            color: #4b5563;
            text-align: center;
            margin-top: 2rem;
        }
        .ql-toolbar.ql-snow {
            border: none !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
            background: #1a1a1a !important;
            border-radius: 12px 12px 0 0 !important;
        }
        .ql-container.ql-snow {
            border: none !important;
            background: rgba(255, 255, 255, 0.05) !important;
            border-radius: 0 0 12px 12px !important;
        }
        .ql-editor {
            color: white !important;
            min-height: 120px;
        }
        .ql-snow .ql-stroke { stroke: #eee !important; }
        .ql-snow .ql-fill { fill: #eee !important; }
        .ql-snow .ql-picker { color: #eee !important; }
    </style>
    <link rel="stylesheet" href="vendor/quill/quill.snow.css">
</head>
<body>
    <div class="options-card">
        <div class="logo-mark">
            <img src="Icons/icon128.png" class="logo-img" alt="MailLayer Logo">
        </div>

        <h1 class="title is-3">MailLayer Setup</h1>
        <p class="subtitle is-6">Configure your integrated email experience.</p>

        <style>
            .button-group {
                display: flex;
                gap: 0.5rem;
                background: rgba(255, 255, 255, 0.05);
                padding: 0.5rem;
                border-radius: 16px;
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            .button-group .btn-option {
                flex: 1;
                background: transparent;
                border: none;
                color: #9ca3af;
                padding: 1rem;
                border-radius: 12px;
                cursor: pointer;
                font-weight: 600;
                transition: all 0.2s;
                text-align: center;
                font-size: 0.9rem;
            }
            .button-group .btn-option.is-active {
                background: var(--burnt-tangerine);
                color: var(--white);
                box-shadow: 0 4px 12px rgba(224, 54, 22, 0.3);
            }
            .button-group .btn-option:hover:not(.is-active) {
                background: rgba(255, 255, 255, 0.08);
                color: var(--white);
            }
        </style>

        <div class="field mb-6">
            <label class="field-label" style="color: var(--burnt-tangerine)">Preferred Provider</label>
            <div class="button-group" data-id="preferredProvider">
                <button class="btn-option is-active" data-value="gmail_web">Gmail</button>
                <button class="btn-option" data-value="outlook_web">Outlook</button>
            </div>
            <p class="help has-text-grey-light">Primary webmail service for MailLayer.</p>
        </div>

        <div class="field mb-6">
            <label class="field-label" style="color: var(--burnt-tangerine)">Default Experience</label>
            <div class="button-group" data-id="preferredEditor">
                <button class="btn-option is-active" data-value="modal">Floating Modal</button>
                <button class="btn-option" data-value="sidebar">Side Panel</button>
            </div>
            <p class="help has-text-grey-light">Choose your default composition interface.</p>
        </div>

        <div class="field mb-6" id="account-section">
            <label class="field-label" style="color: var(--burnt-tangerine)">Connected Accounts</label>
            <div id="auth-status" class="mb-3" style="font-size: 0.9rem; color: #9ca3af;">No accounts connected.</div>
            
            <div class="buttons">
                <button id="connect-google" class="button is-dark is-fullwidth mb-2" style="border: 1px solid var(--burnt-tangerine); background: rgba(224, 54, 22, 0.1);">
                    <span class="icon"><i class="fab fa-google"></i></span>
                    <span>Connect Google Account</span>
                </button>
                
                <button id="connect-outlook" class="button is-dark is-fullwidth" style="border: 1px solid var(--burnt-tangerine); background: rgba(224, 54, 22, 0.1);">
                    <span class="icon"><i class="fab fa-microsoft"></i></span>
                    <span>Connect Outlook Account</span>
                </button>
            </div>
        </div>

        <div class="field mb-6">
            <label class="field-label" style="color: var(--burnt-tangerine)">Email Signature (Rich Text)</label>
            <div id="signature-editor" style="min-height: 150px;"></div>
            <p class="help has-text-grey-light">Appended to all outgoing messages.</p>
        </div>

        <style>
            .status {
                position: fixed;
                bottom: 2rem;
                left: 50%;
                transform: translateX(-50%) translateY(20px);
                background: var(--burnt-tangerine);
                color: white;
                padding: 1rem 2rem;
                border-radius: 50px;
                font-weight: 700;
                box-shadow: 0 10px 25px rgba(224, 54, 22, 0.4);
                opacity: 0;
                visibility: hidden;
                transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                z-index: 100;
            }
            .status.visible {
                opacity: 1;
                visibility: visible;
                transform: translateX(-50%) translateY(0);
            }
        </style>

        <div id="status" class="status">Settings saved successfully!</div>

        <div class="brand-hint">
        </div>

    </div>

    <script src="vendor/quill/quill.min.js"></script>
    <script src="options.js"></script>
</body>
</html>
